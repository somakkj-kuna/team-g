# 풍속
# ─────────────────────────────────────────
[variables.wind_speed]
enable = true

[variables.wind_speed.enabled_tests]
range   = true
stuck   = true
roc     = false
spike   = true
rolling = false
edge    = true

[variables.wind_speed.stuck]
[variables.wind_speed.stuck.hourly]
suspect_count = 16
fail_count    = 24

[variables.wind_speed.spike]
suspect = 30.0
fail    = 45.0

[variables.wind_speed.edge]
n_start = 3
abs_fail    = 5.0
abs_suspect = 3.0

[variables.wind_speed.range]
min = 0.0
max = 75.0

[variables.wind_speed.rolling]
window        = "2160h"
suspect_sigma = 3.0
fail_sigma    = 5.0
min_periods   = 100
min_std       = 1.0

# ─────────────────────────────────────────
# 순간최대풍속
# ─────────────────────────────────────────
[variables.wind_gust]
enable = true

[variables.wind_gust.enabled_tests]
range       = true
stuck       = true
roc         = false
spike       = true
rolling     = false 
edge        = true
consistency = false

[variables.wind_gust.stuck]
[variables.wind_gust.stuck.hourly]
suspect_count = 16
fail_count    = 24

[variables.wind_gust.spike]
suspect = 35.0
fail    = 50.0

[variables.wind_gust.edge]
n_start = 3
abs_fail    = 5.0
abs_suspect = 3.0

[variables.wind_gust.range]
min = 0.0
max = 100.0

[variables.wind_gust.rolling]
window        = "2160h"
suspect_sigma = 3.0
fail_sigma    = 5.0
min_periods   = 100
min_std       = 1.5

[variables.wind_gust.consistency]
reference_col            = "wind_speed"
propagate_bad            = true
propagate_level          = "suspect"  # wind_speed BAD → wind_gust SUSPECT
ref_zero_threshold       = 0.5   # wind_speed < 0.5 m/s = 정온
target_nonzero_threshold = 2.0   # wind_gust > 2.0 m/s = 비정상

# ─────────────────────────────────────────
# 풍속 벡터 (u, v) — current_u/v와 동일 구조
# ─────────────────────────────────────────
[variables.wind_u]
enable = false  # u/v 성분은 QC 제외 (speed/dir로 대체)

[variables.wind_u.enabled_tests]
range        = false
vector_range = false
stuck        = true
vector_stuck = false
roc          = false
vector_roc   = false
spike        = true
rolling      = false
edge         = true

[variables.wind_u.stuck]
epsilon = 0.0
[variables.wind_u.stuck.hourly]
suspect_count = 16
fail_count    = 24

[variables.wind_u.spike]
suspect = 25.0
fail    = 35.0

[variables.wind_u.edge]
n_start = 3
abs_fail    = 5.0
abs_suspect = 3.0

[variables.wind_u.rolling]
window        = "2160h"
suspect_sigma = 3.0
fail_sigma    = 5.0
min_periods   = 100
min_std       = 1.0

[variables.wind_v]
enable = false  # u/v 성분은 QC 제외 (speed/dir로 대체)

[variables.wind_v.enabled_tests]
range        = false
vector_range = false
stuck        = true
vector_stuck = false
roc          = false
vector_roc   = false
spike        = true
rolling      = false
edge         = true

[variables.wind_v.stuck]
epsilon = 0.0
[variables.wind_v.stuck.hourly]
suspect_count = 16
fail_count    = 24

[variables.wind_v.spike]
suspect = 40.0
fail    = 50.0

[variables.wind_v.edge]
n_start = 3
abs_fail    = 5.0
abs_suspect = 3.0

[variables.wind_v.rolling]
window        = "2160h"
suspect_sigma = 3.0
fail_sigma    = 5.0
min_periods   = 100
min_std       = 1.0
