# QC 규칙 마스터 설정
# 변수별 기본값. 기관별(config/agencies/) · 관측소별(config/stations/) 오버라이드 가능.
# 수정 시 반드시 검증 명령 기록: python -m py_compile src/pipeline/01_aqc1.py
#
# ─────────────────────────────────────────
# 검사 on/off 토글 (Task E)
# ─────────────────────────────────────────
# 각 변수의 [variables.X.enabled_tests] 에서 검사별 true/false 로 켜고 끈다.
# 파이프라인 dispatch 는 enabled_tests.{검사}=false(또는 키 없음)이면 해당 검사를
# 건너뛰고 그 검사 몫은 GOOD(1) 로 남는다. 운영 안전을 위해 "키 없음=off" 기본.
# 적용 검사: zero, range, dynamic_range, stuck, attenuated, spike, roc,
#            rolling, reference, vertical, vector_range, edge, consistency
#
# ─────────────────────────────────────────
# 신규 3종 검사 (QC_algo_comparison.md 기반, AQC1 단계 → flag_aqc1 병합)
# ─────────────────────────────────────────
# 1) dynamic_range : 월별/계절 분위값 테이블로 "고정범위 내 계절 이상값" 탐지
#      [variables.X.dynamic_range]  mode="monthly"|"seasonal"
#      [variables.X.dynamic_range.table] "1"=[lo_bad,hi_bad] 또는 [lo_bad,lo_sus,hi_sus,hi_bad]
#      [variables.X.dynamic_range.fallback] vmin=.., vmax=..  (테이블 없는 월용)
# 2) attenuated     : rolling 변동량(std|range)이 min_var 미만 지속 → SUSPECT (센서 감쇠)
#      [variables.X.attenuated]  window="72h", min_var=.., metric="std"|"range"
# 3) spike method   : [variables.X.spike] method="neighbor"(기본)|"tukey53h"|"zscore"|"iqr"|"median"
#      tukey53h 는 MAD 배수 N = spike.threshold(없으면 spike.fail) 사용


# ─────────────────────────────────────────
# 원본 데이터 경로 (raw CSV)
# ─────────────────────────────────────────
[paths.khoa.tidal]
raw = "/data/DATA/OBS/raw/khoa/tidal"

[paths.khoa.buoy]
raw = "/data/DATA/OBS/raw/khoa/buoy"

[paths.kma.buoy]
raw = "/data/DATA/OBS/raw/kma/buoy"

[paths.nifs.buoy]
raw = "/data/DATA/OBS/raw/nifs/buoy"

[flag]
good        = 1
suspect     = 2
bad         = 3
interpolated = 4
missing     = 9

[standardization]
timestamp_col = "time"
station_col   = "station_id"
common_cols   = ["time", "agency", "station_id", "lat", "lon", "depth_m"]

# 원시 var_id → 표준 var_id 매핑
[standardization.var_aliases]
# variables.yaml 기준 표준명 (raw CSV는 이미 표준명 사용 — alias 최소화)
temp          = ["temp"]
sal           = ["sal"]
sur_temp      = ["sur_temp"]
mid_temp      = ["mid_temp"]
bot_temp      = ["bot_temp"]
tide_pre      = ["tide_pre", "tide_pred", "pre_value"]
tide_real     = ["tide_real", "real_value"]
current_speed = ["current_speed"]
current_dir   = ["current_dir"]
current_u     = ["current_u"]
current_v     = ["current_v"]
wave_h        = ["wave_h"]
air_temp      = ["air_temp"]
air_pres      = ["air_pres"]
air_humi      = ["air_humi"]
wind_dir      = ["wind_dir"]
wind_speed    = ["wind_speed"]
wind_gust     = ["wind_gust"]
wind_u        = ["wind_u"]
wind_v        = ["wind_v"]

# 결측 대체 sentinel
[standardization.missing_sentinels]
values = [-999.0, -9999.0, 999.0, 9999.0]

# ─────────────────────────────────────────
# 수온 (표층)
# ─────────────────────────────────────────
[variables.temp]
enable = true

[variables.temp.enabled_tests]
zero    = true
range   = true
dynamic_range = true   # 신규: 1월 분위표로 계절 이상 수온 탐지 (검증용 활성)
stuck   = true
attenuated = true      # 신규: 수온 신호 감쇠(센서 고착 전조) 탐지
roc     = false
spike   = true
rolling = true
reference = false
vertical  = false
edge      = true

[variables.temp.range]
min = -2.0
max = 40.0

# 신규: 동적 분위값 범위 (경험적 임시 기준 — 한국 연근해 1월 표층수온 분포 개략)
[variables.temp.dynamic_range]
mode = "monthly"
[variables.temp.dynamic_range.table]
"1" = [-2.0, 1.0, 16.0, 20.0]   # 1월: (lo_bad, lo_sus, hi_sus, hi_bad)
[variables.temp.dynamic_range.fallback]
vmin = -2.0
vmax = 40.0

# 신규: 신호 감쇠 (경험적 임시 기준 — 72h 표준편차 0.05°C 미만 지속 시 의심)
[variables.temp.attenuated]
window  = "72h"
min_var = 0.05
metric  = "std"

[variables.temp.stuck]
# 겨울 평탄 구간 과검출 방지: 기존 5/10 → 완화
[variables.temp.stuck.hourly]
suspect_count = 12
fail_count    = 48

[variables.temp.roc]
suspect_per_hour = 3.0
fail_per_hour    = 5.0

[variables.temp.spike]
method  = "neighbor"   # neighbor(기본) | tukey53h | zscore | iqr | median
suspect = 3.0
fail    = 7.0
threshold = 3.0        # tukey53h 선택 시 MAD 배수 N (QARTOD 권고 수온 N=3)

[variables.temp.rolling]
window        = "2160h"
suspect_sigma = 3.0
fail_sigma    = 5.0
min_periods   = 100
min_std       = 0.5

[variables.temp.edge]
n_start = 3
abs_fail    = 2.0
abs_suspect = 1.0

[variables.sur_temp]
enable = true

[variables.sur_temp.enabled_tests]
zero      = true
range     = true
dynamic_range = false  # 신규: 분위표 확보 후 활성 (토글 off 예시)
stuck     = true
attenuated = true      # 신규: 표층수온 신호 감쇠 탐지
roc       = false
spike     = true
rolling   = true
reference = false
vertical  = false
edge      = true

[variables.sur_temp.range]
min = -2.0
max = 40.0

# 신규: 동적 분위값 범위 (분위표 확보 전 콜드스타트 — fallback 만 동작)
[variables.sur_temp.dynamic_range]
mode = "monthly"
[variables.sur_temp.dynamic_range.fallback]
vmin = -2.0
vmax = 40.0

# 신규: 신호 감쇠 (경험적 임시 기준)
[variables.sur_temp.attenuated]
window  = "72h"
min_var = 0.05
metric  = "std"

[variables.sur_temp.stuck]
[variables.sur_temp.stuck.hourly]
suspect_count = 12
fail_count    = 48

[variables.sur_temp.roc]
suspect_per_hour = 3.0
fail_per_hour    = 5.0

[variables.sur_temp.spike]
method  = "neighbor"   # neighbor(기본) | tukey53h | zscore | iqr | median
suspect = 3.0
fail    = 7.0
threshold = 3.0        # tukey53h 선택 시 MAD 배수 N

[variables.sur_temp.rolling]
window        = "2160h"
suspect_sigma = 3.0
fail_sigma    = 5.0
min_periods   = 100
min_std       = 0.5

[variables.sur_temp.edge]
n_start = 3
abs_fail    = 2.0
abs_suspect = 1.0

[variables.mid_temp]
enable = true

[variables.mid_temp.enabled_tests]
zero      = true
range     = true
stuck     = true
roc       = false
spike     = true
rolling   = true
reference = false
vertical  = false
edge      = true

[variables.mid_temp.range]
min = 0.0
max = 35.0

[variables.mid_temp.stuck]
[variables.mid_temp.stuck.hourly]
suspect_count = 12
fail_count    = 48

[variables.mid_temp.roc]
suspect_per_hour = 2
fail_per_hour    = 4

[variables.mid_temp.spike]
suspect = 2.5
fail    = 8.0

[variables.mid_temp.rolling]
window        = "2160h"
suspect_sigma = 3.0
fail_sigma    = 5.0
min_periods   = 100
min_std       = 0.2

[variables.mid_temp.edge]
n_start = 3
abs_fail    = 2.0
abs_suspect = 1.0

[variables.mid_temp.vertical]
[[variables.mid_temp.vertical.rules]]
other    = "sur_temp"
min_diff = -2.0
max_diff =  8.0
[[variables.mid_temp.vertical.rules]]
other    = "bot_temp"
min_diff = -2.0
max_diff =  6.0

