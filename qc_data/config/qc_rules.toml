# 신규: 신호 감쇠 옵션 (경험적 임시 기준 — 72h 표준편차 1cm 미만; 조석으로 변동 큼 → 기본 off)
[variables.tide_real.attenuated]
window  = "72h"
min_var = 1.0
metric  = "std"

[variables.tide_real.stuck]
[variables.tide_real.stuck.hourly]
suspect_count = 12
fail_count    = 36

[variables.tide_real.roc]
# 조석 주기 급변 허용: 기존 120/200 → 완화
